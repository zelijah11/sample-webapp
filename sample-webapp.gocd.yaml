format_version: 10
pipelines:
  sample-webapp:
    group: playground
    materials:
      git:
        git: https://github.com/<your-username>/sample-webapp.git
        branch: main
    stages:
      - build-and-deploy:
          jobs:
            - build:
                tasks:
                  - script: |
                      REGISTRY=100.67.240.124:30500
                      IMAGE=$REGISTRY/sample-webapp:latest

                      # Write insecure registry config for buildkit
                      mkdir -p /home/go/.buildkit
                      cat > /home/go/.buildkit/buildkitd.toml <<EOF
                      [registry."$REGISTRY"]
                        http = true
                        insecure = true
                      EOF

                      # Build and push
                      docker buildx build \
                        --platform linux/amd64,linux/arm64 \
                        --config /home/go/.buildkit/buildkitd.toml \
                        -t $IMAGE --push .

                      # Deploy to k3s
                      kubectl apply -f sample-webapp-k8s.yaml
